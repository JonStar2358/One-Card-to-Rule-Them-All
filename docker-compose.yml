version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: elementara
      POSTGRES_USER: elementara_user
      POSTGRES_PASSWORD: elementara_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://elementara_user:elementara_pass@postgres:5432/elementara
      JWT_SECRET: dev_secret_key_change_in_production
      NODE_ENV: development
    depends_on:
      - postgres
    volumes:
      - ./server:/app

volumes:
  postgres_data:
