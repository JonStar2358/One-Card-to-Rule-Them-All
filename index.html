
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fire: #e85c2a; --water: #2a8be8; --earth: #7a5c2a;
    --air: #7ab8e8; --lightning: #e8d02a; --ice: #a8ddf0;
    --nature: #3ab84a; --shadow: #6a3ab8; --light: #f0d060; --metal: #9ab0c0;
    --bg: #0a0a14; --panel: #12121e; --border: #2a2a3e;
    --text: #e8e0d0; --muted: #888898; --accent: #c8a050;
    --hp-green: #3ab84a; --hp-yellow: #d8b030; --hp-red: #e83a2a;
  }

  body { font-family: 'Crimson Pro', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ---- AUTH SCREEN ---- */
  #auth-screen { align-items: center; justify-content: center; background: radial-gradient(ellipse at 50% 30%, #1a1030 0%, #0a0a14 70%); }
  .auth-box { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 360px; text-align: center; }
  .game-title { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 0.25rem; }
  .game-sub { font-size: 0.95rem; color: var(--muted); margin-bottom: 2rem; font-style: italic; }
  .auth-btn { width: 100%; padding: 0.75rem; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-bottom: 0.75rem; font-family: 'Crimson Pro', serif; transition: all 0.2s; }
  .auth-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-google { background: #fff; color: #333; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
  .btn-guest { background: var(--border); color: var(--text); }
  .auth-divider { color: var(--muted); font-size: 0.85rem; margin: 0.5rem 0; }

  /* ---- MAIN MENU ---- */
  #menu-screen { background: radial-gradient(ellipse at 50% 20%, #1a1030 0%, #0a0a14 70%); align-items: center; justify-content: center; }
  .menu-box { text-align: center; max-width: 500px; width: 100%; padding: 1rem; }
  .menu-title { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
  .player-greeting { color: var(--muted); font-style: italic; margin-bottom: 2rem; font-size: 1.1rem; }
  .menu-card-preview { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
  .mini-card { width: 60px; height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; transition: transform 0.2s; }
  .mini-card:hover { transform: scale(1.15) rotate(3deg); }
  .menu-btn { display: block; width: 100%; padding: 0.9rem; margin-bottom: 0.75rem; border: 1px solid var(--border); background: var(--panel); color: var(--text); font-family: 'Cinzel', serif; font-size: 1rem; border-radius: 8px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; }
  .menu-btn:hover { background: #1e1e30; border-color: var(--accent); color: var(--accent); }
  .menu-btn.primary { background: linear-gradient(135deg, #2a1a50, #4a2a80); border-color: #8060c0; }
  .logout-link { color: var(--muted); font-size: 0.85rem; cursor: pointer; margin-top: 1rem; }
  .logout-link:hover { color: var(--text); }

  /* ---- CAMPAIGN MAP ---- */
  #campaign-screen { background: #0a0a14; }
  .top-bar { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; background: var(--panel); border-bottom: 1px solid var(--border); }
  .top-bar h2 { font-family: 'Cinzel', serif; color: var(--accent); font-size: 1.1rem; flex: 1; }
  .back-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: 'Crimson Pro', serif; }
  .back-btn:hover { color: var(--text); border-color: var(--text); }
  .campaign-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
  .chapter { margin-bottom: 2rem; }
  .chapter-title { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--accent); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .stage-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .stage-btn { padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid; cursor: pointer; font-family: 'Crimson Pro', serif; font-size: 0.9rem; transition: all 0.2s; min-width: 130px; text-align: left; }
  .stage-btn.locked { border-color: var(--border); background: #0d0d18; color: var(--muted); cursor: not-allowed; }
  .stage-btn.available { border-color: #5040a0; background: #16142a; color: var(--text); }
  .stage-btn.available:hover { border-color: var(--accent); background: #1e1a38; }
  .stage-btn.completed { border-color: var(--hp-green); background: #0e1e10; color: #90e0a0; }
  .stage-btn.boss { border-color: var(--hp-red); }
  .stage-btn.boss.available { background: #200a0a; color: #ffb0a0; }
  .stage-icon { font-size: 1.1rem; margin-right: 0.3rem; }
  .stage-name { font-weight: 600; display: block; font-size: 0.85rem; }
  .stage-diff { font-size: 0.75rem; opacity: 0.7; }

  /* ---- COLLECTION ---- */
  #collection-screen { background: #0a0a14; }
  .coll-body { flex: 1; overflow-y: auto; padding: 1rem; }
  .coll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }

  /* ---- CARDS ---- */
  .card { border-radius: 12px; padding: 0.75rem; border: 2px solid; cursor: pointer; transition: all 0.25s; position: relative; }
  .card:hover { transform: translateY(-4px) scale(1.02); }
  .card-icon { font-size: 2rem; text-align: center; margin-bottom: 0.4rem; }
  .card-name { font-family: 'Cinzel', serif; font-size: 0.75rem; text-align: center; margin-bottom: 0.3rem; font-weight: 600; }
  .card-element { font-size: 0.65rem; text-align: center; opacity: 0.8; margin-bottom: 0.3rem; }
  .card-stats { display: flex; justify-content: space-between; font-size: 0.7rem; margin-top: 0.4rem; }
  .stat { text-align: center; }
  .stat-val { font-weight: 600; font-size: 0.8rem; }
  .stat-lbl { opacity: 0.6; font-size: 0.6rem; }
  .card-level { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.6); border-radius: 10px; padding: 1px 5px; font-size: 0.65rem; font-family: 'Cinzel', serif; }

  /* ---- CARD DETAIL ---- */
  #card-detail { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem; }
  #card-detail.open { display: flex; }
  .detail-box { background: var(--panel); border-radius: 16px; border: 2px solid; max-width: 420px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .detail-header { padding: 1.25rem; text-align: center; border-bottom: 1px solid var(--border); }
  .detail-icon { font-size: 3rem; margin-bottom: 0.5rem; }
  .detail-name { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--accent); }
  .detail-element { font-size: 0.85rem; color: var(--muted); font-style: italic; }
  .detail-body { padding: 1rem 1.25rem; }
  .detail-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
  .detail-stat { background: #0d0d18; border-radius: 8px; padding: 0.5rem; text-align: center; }
  .detail-stat-val { font-size: 1.3rem; font-weight: 600; }
  .detail-stat-lbl { font-size: 0.7rem; color: var(--muted); }
  .abilities-title { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--accent); margin-bottom: 0.5rem; }
  .ability-row { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.5rem; border-radius: 6px; background: #0d0d18; margin-bottom: 0.4rem; }
  .ability-icon { font-size: 1.1rem; min-width: 24px; }
  .ability-info { flex: 1; }
  .ability-name { font-weight: 600; font-size: 0.8rem; }
  .ability-desc { font-size: 0.72rem; color: var(--muted); }
  .ability-cost { font-size: 0.7rem; color: var(--lightning); margin-left: auto; min-width: 40px; text-align: right; }
  .upgrade-section { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .upgrade-btn { width: 100%; padding: 0.6rem; background: linear-gradient(135deg, #2a1a50, #4a2a80); border: 1px solid #8060c0; border-radius: 8px; color: var(--text); font-family: 'Cinzel', serif; font-size: 0.85rem; cursor: pointer; margin-top: 0.5rem; }
  .upgrade-btn:hover { filter: brightness(1.15); }
  .upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
  .gold-display { color: var(--accent); font-weight: 600; }
  .close-detail { position: absolute; top: 1rem; right: 1rem; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 0.25rem 0.6rem; cursor: pointer; font-size: 1rem; }

  /* ---- BATTLE SCREEN ---- */
  #battle-screen { background: #080814; }
  .battle-arena { flex: 1; display: flex; flex-direction: column; padding: 1rem; gap: 0.75rem; overflow-y: auto; }
  .combatant { background: var(--panel); border-radius: 12px; border: 1px solid var(--border); padding: 0.75rem 1rem; }
  .comb-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
  .comb-icon { font-size: 1.8rem; }
  .comb-name { font-family: 'Cinzel', serif; font-size: 0.95rem; flex: 1; }
  .comb-hp-text { font-size: 0.8rem; color: var(--muted); }
  .hp-bar-bg { background: #0d0d18; border-radius: 4px; height: 8px; overflow: hidden; }
  .hp-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .status-chips { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.4rem; }
  .chip { padding: 0.15rem 0.4rem; border-radius: 10px; font-size: 0.65rem; background: #1a1a2e; border: 1px solid var(--border); }

  .battle-log { background: var(--panel); border-radius: 10px; border: 1px solid var(--border); padding: 0.5rem 0.75rem; max-height: 120px; overflow-y: auto; font-size: 0.8rem; line-height: 1.6; }
  .battle-log p { margin: 0; padding: 0.1rem 0; }
  .log-player { color: #90c8ff; }
  .log-enemy { color: #ffa090; }
  .log-system { color: var(--accent); font-style: italic; }
  .log-heal { color: var(--hp-green); }

  .ability-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.5rem; }
  .battle-ability-btn { background: #0d0d18; border: 1px solid; border-radius: 8px; padding: 0.5rem 0.4rem; cursor: pointer; text-align: center; transition: all 0.2s; font-family: 'Crimson Pro', serif; }
  .battle-ability-btn:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-2px); }
  .battle-ability-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ba-icon { font-size: 1.2rem; }
  .ba-name { font-size: 0.7rem; font-weight: 600; display: block; margin: 0.2rem 0 0.1rem; }
  .ba-cost { font-size: 0.65rem; color: var(--lightning); }

  .mana-bar-wrap { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; }
  .mana-label { font-size: 0.75rem; color: var(--air); min-width: 55px; }
  .mana-pips { display: flex; gap: 3px; }
  .pip { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #5070a0; background: #0d0d18; transition: background 0.3s; }
  .pip.filled { background: var(--air); }

  .battle-over-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 50; }
  .battle-over-overlay.show { display: flex; }
  .battle-result { background: var(--panel); border-radius: 16px; padding: 2rem; text-align: center; max-width: 320px; }
  .result-title { font-family: 'Cinzel', serif; font-size: 1.8rem; margin-bottom: 0.5rem; }
  .result-reward { font-size: 0.9rem; color: var(--muted); margin: 0.5rem 0 1.5rem; }
  .result-btn { padding: 0.6rem 1.5rem; background: linear-gradient(135deg, #2a1a50, #4a2a80); border: 1px solid #8060c0; border-radius: 8px; color: var(--text); font-family: 'Cinzel', serif; font-size: 0.9rem; cursor: pointer; }

  .turn-badge { display: inline-block; font-size: 0.7rem; background: #1a1a2e; border: 1px solid var(--border); padding: 0.15rem 0.5rem; border-radius: 10px; color: var(--muted); }

  #notif { position: fixed; top: 1rem; right: 1rem; background: var(--panel); border: 1px solid var(--accent); border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.85rem; color: var(--accent); z-index: 200; display: none; max-width: 260px; }
</style>
</head>
<body>

<div id="notif"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <div class="game-title">ELEMENTARA</div>
    <div class="game-sub">The One Card Chronicle</div>
    <div style="font-size:2.5rem;margin-bottom:1.5rem">🃏</div>
    <button class="auth-btn btn-google" onclick="authGoogle()">
      <span style="font-size:1.1rem">G</span> Continue with Google
    </button>
    <div class="auth-divider">— or —</div>
    <button class="auth-btn btn-guest" onclick="authGuest()">Play as Guest</button>
    <p style="font-size:0.75rem;color:var(--muted);margin-top:1rem">Collect. Upgrade. Conquer.</p>
  </div>
</div>

<!-- MAIN MENU -->
<div id="menu-screen" class="screen">
  <div class="menu-box">
    <div class="menu-title">ELEMENTARA</div>
    <div class="player-greeting" id="greeting">Welcome, Traveler</div>
    <div class="menu-card-preview" id="card-preview"></div>
    <button class="menu-btn primary" onclick="showScreen('campaign-screen')">⚔ Campaign</button>
    <button class="menu-btn" onclick="showCollection()">📚 My Collection</button>
    <button class="menu-btn" onclick="quickBattle()">🎲 Quick Battle</button>
    <div style="color:var(--muted);font-size:0.85rem;margin-top:0.5rem">
      <span style="color:var(--accent)">💰</span> <span id="gold-display">0</span> Gold &nbsp;|&nbsp;
      <span style="color:#90c8ff">✦</span> <span id="gem-display">0</span> Gems
    </div>
    <div class="logout-link" onclick="showScreen('auth-screen')">↩ Switch Account</div>
  </div>
</div>

<!-- CAMPAIGN SCREEN -->
<div id="campaign-screen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('menu-screen')">← Back</button>
    <h2>Campaign World</h2>
    <span style="font-size:0.8rem;color:var(--muted)" id="camp-progress">0 / 20 complete</span>
  </div>
  <div class="campaign-body" id="campaign-body"></div>
</div>

<!-- COLLECTION SCREEN -->
<div id="collection-screen" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('menu-screen')">← Back</button>
    <h2>My Collection</h2>
    <span style="font-size:0.8rem;color:var(--muted)">Tap a card to upgrade</span>
  </div>
  <div class="coll-body">
    <div class="coll-grid" id="coll-grid"></div>
  </div>
</div>

<!-- BATTLE SCREEN -->
<div id="battle-screen" class="screen" style="position:relative">
  <div class="top-bar">
    <button class="back-btn" id="flee-btn" onclick="fleeBattle()">✗ Flee</button>
    <h2 id="battle-title">Battle</h2>
    <span class="turn-badge" id="turn-badge">Turn 1</span>
  </div>
  <div class="battle-arena">
    <div class="combatant" id="enemy-panel">
      <div class="comb-header">
        <div class="comb-icon" id="e-icon">👾</div>
        <div class="comb-name" id="e-name">Enemy</div>
        <div class="comb-hp-text" id="e-hp-text">100/100</div>
      </div>
      <div class="hp-bar-bg"><div class="hp-bar" id="e-hp-bar" style="width:100%;background:var(--hp-green)"></div></div>
      <div class="status-chips" id="e-chips"></div>
    </div>

    <div class="battle-log" id="battle-log"></div>

    <div class="combatant" id="player-panel">
      <div class="comb-header">
        <div class="comb-icon" id="p-icon">🧙</div>
        <div class="comb-name" id="p-name">You</div>
        <div class="comb-hp-text" id="p-hp-text">100/100</div>
      </div>
      <div class="hp-bar-bg"><div class="hp-bar" id="p-hp-bar" style="width:100%;background:var(--hp-green)"></div></div>
      <div class="mana-bar-wrap">
        <span class="mana-label">⚡ Mana</span>
        <div class="mana-pips" id="mana-pips"></div>
      </div>
      <div class="status-chips" id="p-chips"></div>
    </div>

    <div class="ability-bar" id="ability-bar"></div>
  </div>

  <div class="battle-over-overlay" id="battle-over">
    <div class="battle-result">
      <div class="result-title" id="result-title">Victory!</div>
      <div class="result-reward" id="result-reward">+50 Gold</div>
      <button class="result-btn" onclick="endBattle()">Continue</button>
    </div>
  </div>
</div>

<!-- CARD DETAIL MODAL -->
<div id="card-detail">
  <div class="detail-box" id="detail-box">
    <button class="close-detail" onclick="closeDetail()">✕</button>
    <div class="detail-header" id="detail-header"></div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
// ======== GAME DATA ========

const ELEMENTS = {
  fire:      { name:'Fire',      emoji:'🔥', color:'#e85c2a', bg:'#1e0a04', border:'#8a3010' },
  water:     { name:'Water',     emoji:'💧', color:'#2a8be8', bg:'#04101e', border:'#1060a0' },
  earth:     { name:'Earth',     emoji:'🌍', color:'#7a5c2a', bg:'#100c04', border:'#503c10' },
  air:       { name:'Air',       emoji:'🌀', color:'#7ab8e8', bg:'#081018', border:'#407090' },
  lightning: { name:'Lightning', emoji:'⚡', color:'#e8d02a', bg:'#180e00', border:'#907010' },
  ice:       { name:'Ice',       emoji:'❄️', color:'#a8ddf0', bg:'#081018', border:'#4090b0' },
  nature:    { name:'Nature',    emoji:'🌿', color:'#3ab84a', bg:'#041008', border:'#207830' },
  shadow:    { name:'Shadow',    emoji:'🌑', color:'#9060e0', bg:'#08041e', border:'#602090' },
  light:     { name:'Light',     emoji:'✨', color:'#f0d060', bg:'#181004', border:'#a07820' },
  metal:     { name:'Metal',     emoji:'⚙️', color:'#9ab0c0', bg:'#0c1014', border:'#506070' }
};

const CARD_TEMPLATES = [
  { id:'ember_drake', name:'Ember Drake',   element:'fire',      baseHP:80,  baseAtk:18, baseDef:8,  icon:'🐉',
    abilities:[ {id:'a1',name:'Flame Bite',   icon:'🔥',desc:'A searing bite.',  cost:1, dmg:[15,20], type:'dmg', eff:null},
                {id:'a2',name:'Fire Breath',  icon:'💨',desc:'Scorches enemy.',   cost:2, dmg:[22,30], type:'dmg', eff:{burn:2}},
                {id:'a3',name:'Ember Shield', icon:'🛡',desc:'Gains burn ward.',  cost:1, dmg:[0,0],  type:'buff', eff:{shield:10}},
                {id:'a4',name:'Inferno',      icon:'🌋',desc:'Massive fire eruption.', cost:3, dmg:[35,45], type:'dmg', eff:{burn:3}} ]},

  { id:'tidal_sprite', name:'Tidal Sprite', element:'water',     baseHP:90,  baseAtk:14, baseDef:12, icon:'🧜',
    abilities:[ {id:'b1',name:'Water Jet',    icon:'💧',desc:'A sharp water bolt.',   cost:1, dmg:[12,18], type:'dmg', eff:null},
                {id:'b2',name:'Hydro Heal',   icon:'💚',desc:'Restores your HP.',     cost:2, dmg:[-20,-15],type:'heal',eff:null},
                {id:'b3',name:'Torrent',      icon:'🌊',desc:'A crashing wave.',      cost:2, dmg:[20,28], type:'dmg', eff:{slow:1}},
                {id:'b4',name:'Tidal Wave',   icon:'🌊',desc:'Massive flood strike.',  cost:3, dmg:[30,40], type:'dmg', eff:{slow:2}},
                {id:'b5',name:'Mist Veil',    icon:'🌫',desc:'Dodge next attack.',    cost:2, dmg:[0,0],  type:'buff', eff:{evade:1}} ]},

  { id:'stone_golem',  name:'Stone Golem',  element:'earth',     baseHP:130, baseAtk:12, baseDef:20, icon:'🗿',
    abilities:[ {id:'c1',name:'Rock Smash',   icon:'🪨',desc:'Heavy boulder hit.',   cost:1, dmg:[14,20], type:'dmg', eff:null},
                {id:'c2',name:'Earth Armor',  icon:'🛡',desc:'Fortifies defense.',   cost:1, dmg:[0,0],  type:'buff', eff:{shield:18}},
                {id:'c3',name:'Tremor',       icon:'🌋',desc:'Shakes foe\'s footing.', cost:2, dmg:[18,25], type:'dmg', eff:{stun:1}},
                {id:'c4',name:'Boulder Toss', icon:'💥',desc:'Crushes the target.',  cost:2, dmg:[22,30], type:'dmg', eff:null} ]},

  { id:'storm_hawk',   name:'Storm Hawk',   element:'lightning', baseHP:70,  baseAtk:20, baseDef:8,  icon:'🦅',

// ======== GAME STATE ========
let state = {
  player: null,
  gold: 100,
  gems: 3,
  selectedCard: null,
  collection: [], // {templateId, level, xp}
  campaign: {completed:[], unlocked:[0]}, // stage indices [ch][stage]
  currentBattle: null
};

function loadState() {
  try { const s = JSON.parse(localStorage.getItem('elementara')||'{}'); if(s.player) Object.assign(state, s); } catch(e){}
}
function saveState() {
  try { localStorage.setItem('elementara', JSON.stringify(state)); } catch(e){}
}

// ======== INIT ========
function authGoogle() {
  const name = 'Guardian_' + Math.floor(Math.random()*9000+1000);
  state.player = {type:'google', name};
  if(!state.collection.length) initCollection();
  saveState(); showMenu();
}
function authGuest() {
  state.player = {type:'guest', name:'Guest Wanderer'};
  if(!state.collection.length) initCollection();
  saveState(); showMenu();
}

function initCollection() {
  // Start with 3 random cards
  const picks = shuffle([...CARD_TEMPLATES]).slice(0,3);
  state.collection = picks.map(t => ({templateId:t.id, level:1, xp:0}));
  state.selectedCard = state.collection[0].templateId;
}

function getTemplate(id) { return CARD_TEMPLATES.find(t=>t.id===id); }
function getCollCard(id) { return state.collection.find(c=>c.templateId===id); }
function cardLevel(c) { return c ? c.level : 1; }

function cardStats(templateId, level) {
  const t = getTemplate(templateId);
  if(!t) return null;
  const lvl = level || 1;
  return {
    hp:  Math.round(t.baseHP  + (lvl-1)*8),
    atk: Math.round(t.baseAtk + (lvl-1)*3),
    def: Math.round(t.baseDef + (lvl-1)*2)
  };
}

function upgradeCost(level) { return 30 + level * 25; }
function xpToNext(level)    { return 20 + level * 15; }

// ======== SCREENS ========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMenu() {
  updateMenuUI();
  showScreen('menu-screen');
}

function updateMenuUI() {
  document.getElementById('greeting').textContent = `Welcome back, ${state.player.name}`;
  document.getElementById('gold-display').textContent = state.gold;
  document.getElementById('gem-display').textContent = state.gems;
  renderMiniCards();
}

function renderMiniCards() {
  const wrap = document.getElementById('card-preview');
  wrap.innerHTML = '';
  state.collection.slice(0,5).forEach(c => {
    const t = getTemplate(c.templateId);
    if(!t) return;
    const el = ELEMENTS[t.element];
    const d = document.createElement('div');
    d.className = 'mini-card';
    d.style.background = el.bg;
    d.style.borderColor = el.border;
    d.title = t.name;
    d.textContent = t.icon;
    d.onclick = () => openDetail(t.id);
    wrap.appendChild(d);
  });
}

// ======== COLLECTION ========
function showCollection() {
  renderCollection();
  showScreen('collection-screen');
}

function renderCollection() {
  const grid = document.getElementById('coll-grid');
  grid.innerHTML = '';
  // Show owned + greyed out unowned
  CARD_TEMPLATES.forEach(t => {
    const owned = getCollCard(t.id);
    const el = ELEMENTS[t.element];
    const lvl = owned ? owned.level : 0;
    const stats = cardStats(t.id, lvl||1);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.background = owned ? el.bg : '#0a0a0a';
    card.style.borderColor = owned ? el.border : '#1a1a1a';
    card.style.opacity = owned ? '1' : '0.4';
    card.innerHTML = `
      <div class="card-level">Lv ${lvl||'?'}</div>
      <div class="card-icon">${t.icon}</div>
      <div class="card-name" style="color:${owned?el.color:'#555'}">${t.name}</div>
      <div class="card-element" style="color:${owned?el.color:'#333'}">${el.emoji} ${el.name}</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-val">${stats.hp}</div><div class="stat-lbl">HP</div></div>
        <div class="stat"><div class="stat-val">${stats.atk}</div><div class="stat-lbl">ATK</div></div>
        <div class="stat"><div class="stat-val">${stats.def}</div><div class="stat-lbl">DEF</div></div>
      </div>
    `;
    if(owned) {
      card.onclick = () => openDetail(t.id);
      if(t.id === state.selectedCard) card.style.outline = `2px solid ${el.color}`;
    }
    grid.appendChild(card);
  });
}

// ======== CARD DETAIL ========
function openDetail(templateId) {
  const t = getTemplate(templateId);
  const owned = getCollCard(templateId);
  if(!t || !owned) return;
  const el = ELEMENTS[t.element];
  const lvl = owned.level;
  const stats = cardStats(t.id, lvl);
  const cost = upgradeCost(lvl);
  const xpNeeded = xpToNext(lvl);

  document.getElementById('detail-box').style.borderColor = el.border;
  document.getElementById('detail-header').innerHTML = `
    <div class="detail-icon">${t.icon}</div>
    <div class="detail-name">${t.name}</div>
    <div class="detail-element">${el.emoji} ${el.name} • Level ${lvl}</div>
    <div style="font-size:0.75rem;color:var(--muted);margin-top:0.3rem">XP: ${owned.xp}/${xpNeeded}</div>
  `;

  const abilitiesHtml = t.abilities.map(a => {
    const unlocked = lvl >= abilityUnlockLevel(t.abilities.indexOf(a));
    return `<div class="ability-row" style="opacity:${unlocked?1:0.4}">
      <div class="ability-icon">${a.icon}</div>
      <div class="ability-info">
        <div class="ability-name">${a.name}${!unlocked?' 🔒':''}</div>
        <div class="ability-desc">${a.desc}</div>
      </div>
      <div class="ability-cost">${a.cost}⚡</div>
    </div>`;
  }).join('');

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-stats">
      <div class="detail-stat"><div class="detail-stat-val" style="color:var(--hp-green)">${stats.hp}</div><div class="detail-stat-lbl">HP</div></div>
      <div class="detail-stat"><div class="detail-stat-val" style="color:#f08060">${stats.atk}</div><div class="detail-stat-lbl">ATK</div></div>
      <div class="detail-stat"><div class="detail-stat-val" style="color:#60a0f0">${stats.def}</div><div class="detail-stat-lbl">DEF</div></div>
    </div>
    <div class="abilities-title">Abilities</div>
    ${abilitiesHtml}
    <div class="upgrade-section">
      <div style="font-size:0.85rem;color:var(--muted)">Upgrade to Level ${lvl+1}</div>
      <div style="font-size:0.8rem;margin:0.3rem 0">Cost: <span class="gold-display">💰 ${cost} Gold</span></div>
      <button class="upgrade-btn" onclick="upgradeCard('${templateId}')" ${state.gold>=cost?'':'disabled'}>
        ${state.gold>=cost?'✦ Upgrade Card':'Not enough Gold'}
      </button>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:0.5rem">ATK +3 · DEF +2 · HP +8</div>
      <div style="margin-top:0.75rem">
        <button style="width:100%;padding:0.5rem;background:${t.id===state.selectedCard?'#2a2040':'#0d0d18'};border:1px solid ${t.id===state.selectedCard?'#8060c0':el.border};border-radius:8px;color:var(--text);cursor:pointer;font-family:'Crimson Pro',serif;font-size:0.85rem;" onclick="selectCard('${templateId}')">
          ${t.id===state.selectedCard?'✓ Active Card':'⚔ Select for Battle'}
        </button>
      </div>
    </div>
  `;

  document.getElementById('card-detail').classList.add('open');
}

function abilityUnlockLevel(idx) {
  const levels = [1, 1, 2, 3, 4];
  return levels[idx] || 4;
}

function closeDetail() { document.getElementById('card-detail').classList.remove('open'); }

function selectCard(id) {
  state.selectedCard = id;
  saveState();
  closeDetail();
  showNotif('Card selected for battle!');
  renderCollection();
}

function upgradeCard(templateId) {
  const owned = getCollCard(templateId);
  if(!owned) return;
  const cost = upgradeCost(owned.level);
  if(state.gold < cost) return;
  state.gold -= cost;
  owned.level++;
  owned.xp = 0;
  saveState();
  showNotif(`${getTemplate(templateId).name} upgraded to Level ${owned.level}!`);
  openDetail(templateId);
  updateMenuUI();
}

// ======== CAMPAIGN ========
function renderCampaign() {
  const body = document.getElementById('campaign-body');
  body.innerHTML = '';
  let totalStages = 0, completedCount = 0;

  CAMPAIGN_STAGES.forEach((chapter, ci) => {
    totalStages += chapter.stages.length;
    const div = document.createElement('div');
    div.className = 'chapter';
    div.innerHTML = `<div class="chapter-title">${chapter.ch}</div>`;
    const row = document.createElement('div');
    row.className = 'stage-row';

    chapter.stages.forEach((stage, si) => {
      const key = `${ci}_${si}`;
      const isDone = state.campaign.completed.includes(key);
      const isUnlocked = state.campaign.unlocked.includes(key);
      if(isDone) completedCount++;

      const btn = document.createElement('button');
      btn.className = 'stage-btn ' + (isDone?'completed':isUnlocked?'available':'locked') + (stage.boss?' boss':'');
      btn.innerHTML = `<span class="stage-name">${stage.name}</span><span class="stage-diff">${isDone?'✓ Done':stage.diff}</span>`;
      if(isUnlocked && !isDone) btn.onclick = () => startBattle(ci, si);
      else if(isDone) btn.onclick = () => startBattle(ci, si); // replay
      row.appendChild(btn);
    });

    div.appendChild(row);
    body.appendChild(div);
  });

  document.getElementById('camp-progress').textContent = `${completedCount} / ${totalStages} complete`;
}

// ======== BATTLE ENGINE ========
let B = {}; // battle state

function quickBattle() {
  const enemyIdx = Math.floor(Math.random()*10);
  launchBattle(enemyIdx, 'Quick Battle', null, null);
}

function startBattle(ci, si) {
  const stage = CAMPAIGN_STAGES[ci].stages[si];
  launchBattle(stage.enemy, stage.name, ci, si);
}

function launchBattle(enemyIdx, title, ci, si) {
  if(!state.selectedCard) { showNotif('Select a card first!'); return; }
  const t = getTemplate(state.selectedCard);
  const owned = getCollCard(state.selectedCard);
  const lvl = owned ? owned.level : 1;
  const stats = cardStats(t.id, lvl);
  const enemy = ENEMIES[enemyIdx];
  const el = ELEMENTS[t.element];

  // Unlock available abilities
  const availAbils = t.abilities.filter((_,i) => lvl >= abilityUnlockLevel(i));

  B = {
    player: { name:state.player.name, icon:t.icon, hp:stats.hp, maxHp:stats.hp, atk:stats.atk, def:stats.def, mana:3, maxMana:5, shield:0, statuses:{}, cardId:t.id, abilities:availAbils, el:el, lvl },
    enemy:  { name:enemy.name, icon:enemy.icon, hp:enemy.hp, maxHp:enemy.hp, atk:enemy.atk, def:enemy.def, mana:0, shield:0, statuses:{}, el:ELEMENTS[enemy.element] },
    turn: 1, playerTurn: true, over: false,
    campaignInfo: ci!==null ? {ci,si,enemy:ENEMIES[enemyIdx]} : null
  };

  document.getElementById('battle-title').textContent = title;
  document.getElementById('battle-over').classList.remove('show');
  renderBattle();
  showScreen('battle-screen');
  addLog('system', `⚔ Battle begins! ${t.icon} ${t.name} vs ${enemy.icon} ${enemy.name}`);
}

function renderBattle() {
  // Enemy
  document.getElementById('e-icon').textContent = B.enemy.icon;
  document.getElementById('e-name').textContent = B.enemy.name;
  updateHPBar('e', B.enemy);
  renderChips('e', B.enemy.statuses);

  // Player
  document.getElementById('p-icon').textContent = B.player.icon;
  document.getElementById('p-name').textContent = getTemplate(B.player.cardId).name;
  updateHPBar('p', B.player);
  renderMana();
  renderChips('p', B.player.statuses);

  // Abilities
  renderAbilityBar();
  document.getElementById('turn-badge').textContent = `Turn ${B.turn}`;
}

function updateHPBar(prefix, comb) {
  const pct = Math.max(0, Math.round(comb.hp/comb.maxHp*100));
  const bar = document.getElementById(`${prefix}-hp-bar`);
  bar.style.width = pct + '%';
  bar.style.background = pct>50 ? 'var(--hp-green)' : pct>25 ? 'var(--hp-yellow)' : 'var(--hp-red)';
  document.getElementById(`${prefix}-hp-text`).textContent = `${Math.max(0,Math.round(comb.hp))}/${comb.maxHp}`;
}

function renderMana() {
  const pips = document.getElementById('mana-pips');
  pips.innerHTML = '';
  for(let i=0;i<B.player.maxMana;i++) {
    const pip = document.createElement('div');
    pip.className = 'pip' + (i < B.player.mana ? ' filled' : '');
    pips.appendChild(pip);
  }
}

function renderChips(prefix, statuses) {
  const wrap = document.getElementById(`${prefix}-chips`);
  wrap.innerHTML = '';
  Object.entries(statuses).forEach(([k,v]) => {
    if(v<=0) return;
    const icons = {burn:'🔥',poison:'☠️',freeze:'❄️',stun:'💫',slow:'🐢',blind:'👁',bleed:'💉',shield:'🛡',evade:'💨',charge:'⚡'};
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = `${icons[k]||'?'} ${k} ${v}`;
    wrap.appendChild(chip);
  });
}

function renderAbilityBar() {
  const bar = document.getElementById('ability-bar');
  bar.innerHTML = '';
  B.player.abilities.forEach(a => {
    const el = B.player.el;
    const canUse = B.player.mana >= a.cost && B.playerTurn && !B.over;
    const btn = document.createElement('button');
    btn.className = 'battle-ability-btn';
    btn.style.borderColor = canUse ? el.border : '#2a2a2a';
    btn.disabled = !canUse;
    btn.innerHTML = `<div class="ba-icon">${a.icon}</div><span class="ba-name">${a.name}</span><div class="ba-cost">${a.cost}⚡</div>`;
    btn.onclick = () => useAbility(a);
    bar.appendChild(btn);
  });
}

function useAbility(ability) {
  if(!B.playerTurn || B.over) return;
  if(B.player.mana < ability.cost) return;

  B.player.mana -= ability.cost;
  const t = getTemplate(B.player.cardId);
  const lvlMult = 1 + (B.player.lvl-1)*0.1;

  if(ability.type === 'heal') {
    const heal = Math.round((-ability.dmg[0] + -ability.dmg[1])/2 * lvlMult);
    B.player.hp = Math.min(B.player.maxHp, B.player.hp + heal);
    addLog('heal', `${t.icon} ${ability.name}: Restored ${heal} HP!`);
  } else if(ability.type === 'buff') {
    applyEffect(B.player, ability.eff);
    addLog('player', `${t.icon} ${ability.name}: Buff applied!`);
  } else {
    // Damage
    let baseDmg = Math.round((ability.dmg[0] + ability.dmg[1])/2 * lvlMult);
    baseDmg += B.player.atk/2;
    if(B.player.statuses.charge) { baseDmg += B.player.statuses.charge; B.player.statuses.charge = 0; }
    if(B.enemy.statuses.blind) baseDmg *= 0.8;
    // Defense
    const reduced = Math.max(1, Math.round(baseDmg - B.enemy.def/3));
    // Shield absorption
    let finalDmg = reduced;
    if(B.enemy.shield > 0) {
      const absorbed = Math.min(B.enemy.shield, finalDmg);
      B.enemy.shield -= absorbed;
      finalDmg -= absorbed;
    }
    B.enemy.hp -= finalDmg;
    let logMsg = `${t.icon} ${ability.name}: ${finalDmg} dmg`;
    if(B.enemy.shield === 0 && reduced > finalDmg) logMsg += ` (shield blocked ${reduced-finalDmg})`;
    if(ability.eff) { applyEffect(B.enemy, ability.eff); }
    // Lifesteal
    if(ability.eff && ability.eff.lifesteal) {
      const steal = Math.round(finalDmg * ability.eff.lifesteal);
      B.player.hp = Math.min(B.player.maxHp, B.player.hp + steal);
      logMsg += ` +${steal} HP`;
    }
    addLog('player', logMsg);
  }

  renderBattle();
  if(B.enemy.hp <= 0) { endCombat(true); return; }
  B.playerTurn = false;

  setTimeout(enemyTurn, 1000);
}

function enemyTurn() {
  if(B.over) return;
  if(B.enemy.statuses.stun > 0) {
    B.enemy.statuses.stun--;
    addLog('log-system', `${B.enemy.icon} is stunned! Skips turn.`);
    tickStatusPlayer();
    return;
  }
  if(B.enemy.statuses.freeze > 0) {
    B.enemy.statuses.freeze--;
    addLog('log-system', `${B.enemy.icon} is frozen! Skips turn.`);
    tickStatusPlayer();
    return;
  }

  let dmg = B.enemy.atk + Math.floor(Math.random()*6);
  const reduced = Math.max(1, Math.round(dmg - B.player.def/3 - (B.player.shield||0)/4));

  if(B.player.statuses.evade > 0) {
    B.player.statuses.evade--;
    addLog('log-enemy', `${B.enemy.icon} attacks — EVADED!`);
  } else {
    let finalDmg = reduced;
    if(B.player.shield > 0) {
      const abs = Math.min(B.player.shield, finalDmg);
      B.player.shield -= abs;
      finalDmg -= abs;
      if(B.player.shield <= 0) delete B.player.statuses.shield;
    }
    B.player.hp -= finalDmg;
    addLog('log-enemy', `${B.enemy.icon} attacks for ${finalDmg} dmg!`);
  }

  tickStatusPlayer();
}

function tickStatusPlayer() {
  // Burn/poison on enemy
  if(B.enemy.statuses.burn > 0) {
    const dd = Math.round(B.enemy.atk * 0.15);
    B.enemy.hp -= dd;
    B.enemy.statuses.burn--;
    addLog('log-system', `🔥 Burn: ${B.enemy.name} takes ${dd} fire dmg`);
  }
  if(B.enemy.statuses.poison > 0) {
    const dd = 5;
    B.enemy.hp -= dd;
    B.enemy.statuses.poison--;
    addLog('log-system', `☠️ Poison: ${B.enemy.name} takes ${dd} dmg`);
  }
  if(B.enemy.statuses.bleed > 0) {
    const dd = 4;
    B.enemy.hp -= dd;
    B.enemy.statuses.bleed--;
  }
  // Player statuses
  if(B.player.statuses.burn > 0) { B.player.hp -= 5; B.player.statuses.burn--; }
  if(B.player.statuses.poison > 0) { B.player.hp -= 4; B.player.statuses.poison--; }

  // Regen mana
  B.player.mana = Math.min(B.player.maxMana, B.player.mana + 2);
  B.turn++;
  B.playerTurn = true;

  renderBattle();

  if(B.enemy.hp <= 0) { endCombat(true); return; }
  if(B.player.hp <= 0) { endCombat(false); return; }
}

function applyEffect(target, eff) {
  if(!eff) return;
  Object.entries(eff).forEach(([k,v]) => {
    if(k === 'shield') target.shield = (target.shield||0) + v;
    else target.statuses[k] = (target.statuses[k]||0) + v;
  });
}

function endCombat(won) {
  B.over = true;
  const overlay = document.getElementById('battle-over');
  overlay.classList.add('show');

  if(won) {
    const enemy = ENEMIES[B.campaignInfo ? B.campaignInfo.enemy : 0];
    const gold = enemy ? enemy.reward.gold : 30;
    const xp   = enemy ? enemy.reward.xp  : 20;
    state.gold += gold;
    // Award XP to active card
    const owned = getCollCard(state.selectedCard);
    if(owned) {
      owned.xp += xp;
      while(owned.xp >= xpToNext(owned.level) && owned.level < 10) {
        owned.xp -= xpToNext(owned.level);
        owned.level++;
        showNotif(`${getTemplate(state.selectedCard).name} leveled up to ${owned.level}!`);
      }
    }
    // Unlock next stage
    if(B.campaignInfo) {
      const {ci,si} = B.campaignInfo;
      const key = `${ci}_${si}`;
      if(!state.campaign.completed.includes(key)) state.campaign.completed.push(key);
      // Unlock next
      if(si+1 < CAMPAIGN_STAGES[ci].stages.length) {
        const nextKey = `${ci}_${si+1}`;
        if(!state.campaign.unlocked.includes(nextKey)) state.campaign.unlocked.push(nextKey);
      } else if(ci+1 < CAMPAIGN_STAGES.length) {
        const nextKey = `${ci+1}_0`;
        if(!state.campaign.unlocked.includes(nextKey)) state.campaign.unlocked.push(nextKey);
      }
      // Maybe unlock a new card
      if(Math.random() < 0.3) {
        const owned2 = state.collection.map(c=>c.templateId);
        const unowned = CARD_TEMPLATES.filter(t=>!owned2.includes(t.id));
        if(unowned.length) {
          const newCard = unowned[Math.floor(Math.random()*unowned.length)];
          state.collection.push({templateId:newCard.id, level:1, xp:0});
          showNotif(`New card unlocked: ${newCard.icon} ${newCard.name}!`);
        }
      }
    }
    saveState();
    document.getElementById('result-title').textContent = '⚔ Victory!';
    document.getElementById('result-title').style.color = 'var(--hp-green)';
    document.getElementById('result-reward').textContent = `+${gold} Gold · +${xp} XP earned`;
  } else {
    document.getElementById('result-title').textContent = '💀 Defeated';
    document.getElementById('result-title').style.color = 'var(--hp-red)';
    document.getElementById('result-reward').textContent = 'No rewards — try again!';
  }
  renderAbilityBar();
  updateMenuUI();
}

function endBattle() {
  document.getElementById('battle-over').classList.remove('show');
  if(B.campaignInfo) { renderCampaign(); showScreen('campaign-screen'); }
  else showMenu();
}

function fleeBattle() {
  if(B.over) { endBattle(); return; }
  B.over = true;
  showScreen(B.campaignInfo ? 'campaign-screen' : 'menu-screen');
  if(B.campaignInfo) renderCampaign();
}

// ======== LOG ========
function addLog(cls, msg) {
  const log = document.getElementById('battle-log');
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = msg;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

// ======== NOTIFY ========
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 2500);
}

// ======== UTILS ========
function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// ======== BOOT ========
loadState();
if(state.player) { updateMenuUI(); showScreen('menu-screen'); }

// Wire campaign render when entering campaign screen
const origShowScreen = showScreen;
window.showCampaignAndRender = function() { renderCampaign(); showScreen('campaign-screen'); };
document.querySelector('#campaign-screen .back-btn').onclick = () => showScreen('menu-screen');
document.querySelector('[onclick="showScreen(\'campaign-screen\')"]').onclick = () => { renderCampaign(); showScreen('campaign-screen'); };
</script>
